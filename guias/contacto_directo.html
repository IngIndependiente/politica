<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contáctame</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .contact-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 24px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            width: 100%;
            text-align: center;
        }
        
        .contact-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .contact-btn:active {
            transform: translateY(-1px);
        }
        
        .btn-messenger {
            background: linear-gradient(135deg, #00B2FF, #006AFF);
        }
        
        .btn-instagram {
            background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        
        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
        }
        
        /* Responsive para móviles */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .contact-buttons {
                padding: 15px;
                gap: 14px;
            }
            
            .contact-btn {
                padding: 16px 20px;
                font-size: 16px;
            }
        }
        
        @media (max-width: 480px) {
            .contact-buttons {
                padding: 10px;
                gap: 12px;
            }
            
            .contact-btn {
                padding: 14px 18px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="contact-buttons">
        <!-- Facebook Messenger -->
        <a href="https://m.me/61586521988475?text=Hola,%20me%20interesa%20conocer%20tus%20propuestas" 
           class="contact-btn btn-messenger"
           target="_blank">
            📘 Messenger
        </a>
        
        <!-- Instagram -->
        <a href="https://ig.me/m/testtest8567" 
           class="contact-btn btn-instagram"
           target="_blank">
            📸 Instagram
        </a>
        
        <!-- WhatsApp -->
        <a href="https://wa.me/56912345678?text=Hola,%20me%20gustaría%20conversar" 
           class="contact-btn btn-whatsapp"
           target="_blank">
            💬 WhatsApp
        </a>
    </div>
</body>
</html>
